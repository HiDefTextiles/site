site_name: HiDef textíll
site_description: Snjallprjón, rannsóknahugbúnaður og samfélagsmiðlun – HiDef textíll / Smart knitting, research software, and public outreach.
site_url: https://hideftextiles.github.io/

theme:
  name: material
  language: is
  features:
    - navigation.top
    - content.code.copy
    - navigation.instant
    - header.autohide
    - search.suggest
    - search.highlight

  palette:
    primary: indigo   # placeholder (overridden by CSS)
    accent: pink      # placeholder (overridden by CSS)

  font:
    text: Jost
    code: JetBrains Mono

  logo: assets/images/hi-logo.png

extra_css:
  - stylesheets/hi.css
  - stylesheets/extra.css

extra_javascript:
  - javascripts/lang-toggle.js

markdown_extensions:
  - admonition
  - footnotes
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - About: about.md
  - Research: research.md
  - Contact: contact.md
